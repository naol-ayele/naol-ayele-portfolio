<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Naol Ayele</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #090606;
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    padding: 40px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 4px; }
  .sub { color: #9E9492; font-size: 0.85rem; margin-bottom: 32px; }

  /* Login */
  #login-form {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  #login-form input {
    background: #110A09;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 12px 16px;
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    width: 320px;
  }
  #login-form input:focus { outline: none; border-color: #EB3B24; }
  .btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { opacity: 0.9; }

  /* Dashboard sections */
  .section { margin-bottom: 40px; }
  .section h2 {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: #9E9492;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stat-row { display: flex; gap: 20px; margin-bottom: 20px; }
  .stat-card {
    background: #110A09;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 20px 28px;
    flex: 1;
  }
  .stat-card .num { font-size: 2rem; font-weight: 700; }
  .stat-card .label { font-size: 0.78rem; color: #9E9492; margin-top: 4px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    color: #9E9492;
    font-weight: 500;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: top;
  }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .error { color: #EB3B24; font-size: 0.85rem; }
  .hidden { display: none; }
  #loading { color: #9E9492; font-size: 0.9rem; }

  .msg-text { max-width: 360px; white-space: pre-wrap; word-break: break-word; }
  .like-heart { color: #EB3B24; }

  @media(max-width: 600px) {
    body { padding: 20px; }
    #login-form input { width: 100%; }
    .stat-row { flex-direction: column; }
    table { font-size: 0.78rem; }
    td, th { padding: 8px 6px; }
  }
</style>
</head>
<body>

<h1>Dashboard</h1>
<p class="sub">naol-ayele-portfolio-v2 &middot; admin panel</p>

<div id="login-form">
  <input type="password" id="api-key-input" placeholder="Enter ADMIN_API_KEY" autocomplete="off">
  <button class="btn" id="unlock-btn">Unlock</button>
  <span id="login-error" class="error"></span>
</div>

<div id="dashboard" class="hidden">
  <div class="section">
    <h2>Analytics</h2>
    <div class="stat-row">
      <div class="stat-card">
        <div class="num" id="total-views">—</div>
        <div class="label">Pageviews (30 days)</div>
      </div>
      <div class="stat-card">
        <div class="num" id="total-messages">—</div>
        <div class="label">Contact Messages</div>
      </div>
      <div class="stat-card">
        <div class="num" id="total-likes">—</div>
        <div class="label">Total Likes</div>
      </div>
    </div>

    <table>
      <thead><tr><th>Path</th><th>Views</th></tr></thead>
      <tbody id="analytics-table"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Contact Messages</h2>
    <table>
      <thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Message</th></tr></thead>
      <tbody id="messages-table"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Project Likes</h2>
    <table>
      <thead><tr><th>Project</th><th>Likes</th><th>Views</th></tr></thead>
      <tbody id="projects-table"></tbody>
    </table>
  </div>
</div>

<div id="loading" class="hidden">Loading...</div>

<script>
var API_BASE = "https://naol-ayele-portfolio.onrender.com";
var apiKey = "";

function getAuth() {
  return { headers: { "x-api-key": apiKey, "Content-Type": "application/json" } };
}

document.getElementById("unlock-btn").addEventListener("click", function () {
  apiKey = document.getElementById("api-key-input").value.trim();
  if (!apiKey) {
    document.getElementById("login-error").textContent = "Enter an API key";
    return;
  }
  document.getElementById("login-error").textContent = "";
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("dashboard").classList.add("hidden");
  loadAll();
});

function loadAll() {
  var data = {};
  var err = "";

  function checkDone() {
    if (data.analytics && data.contacts && data.projects) {
      render(data);
    }
  }

  fetch(API_BASE + "/api/analytics/summary", getAuth())
    .then(function (r) {
      if (!r.ok) throw new Error("Unauthorized or server error");
      return r.json();
    })
    .then(function (d) { data.analytics = d; checkDone(); })
    .catch(function (e) { err = e.message; fail(e); });

  fetch(API_BASE + "/api/contact", getAuth())
    .then(function (r) {
      if (!r.ok) throw new Error("Unauthorized or server error");
      return r.json();
    })
    .then(function (d) { data.contacts = d; checkDone(); })
    .catch(function (e) { err = e.message; fail(e); });

  fetch(API_BASE + "/api/projects")
    .then(function (r) { return r.json(); })
    .then(function (d) { data.projects = d; checkDone(); })
    .catch(function (e) { err = e.message; fail(e); });

  function fail(e) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("login-error").textContent = "Failed: " + e.message;
    document.getElementById("dashboard").classList.add("hidden");
  }

  function render(d) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    // Analytics summary
    document.getElementById("total-views").textContent = d.analytics.totalViews;
    var tbody = document.getElementById("analytics-table");
    tbody.innerHTML = "";
    (d.analytics.byPath || []).forEach(function (row) {
      var tr = document.createElement("tr");
      tr.innerHTML = "<td>" + escapeHtml(row.path) + "</td><td>" + row.views + "</td>";
      tbody.appendChild(tr);
    });
    if (d.analytics.byPath.length === 0) {
      tbody.innerHTML = "<tr><td colspan='2' style='color:#9E9492'>No pageviews yet</td></tr>";
    }

    // Contact messages
    document.getElementById("total-messages").textContent = (d.contacts || []).length;
    var mtbody = document.getElementById("messages-table");
    mtbody.innerHTML = "";
    (d.contacts || []).forEach(function (msg) {
      var tr = document.createElement("tr");
      tr.innerHTML = "<td>" + escapeHtml(msg.created_at) + "</td><td>" + escapeHtml(msg.name) + "</td><td><a href='mailto:" + escapeHtml(msg.email) + "' style='color:#EB3B24;text-decoration:none'>" + escapeHtml(msg.email) + "</a></td><td class='msg-text'>" + escapeHtml(msg.message) + "</td>";
      mtbody.appendChild(tr);
    });
    if ((d.contacts || []).length === 0) {
      mtbody.innerHTML = "<tr><td colspan='4' style='color:#9E9492'>No messages yet</td></tr>";
    }

    // Projects
    var totalLikes = 0;
    var ptbody = document.getElementById("projects-table");
    ptbody.innerHTML = "";
    (d.projects || []).forEach(function (p) {
      totalLikes += p.likes;
      var tr = document.createElement("tr");
      tr.innerHTML = "<td>" + escapeHtml(p.name) + "</td><td><span class='like-heart'>♥</span> " + p.likes + "</td><td>" + p.views + "</td>";
      ptbody.appendChild(tr);
    });
    document.getElementById("total-likes").textContent = totalLikes;
    if ((d.projects || []).length === 0) {
      ptbody.innerHTML = "<tr><td colspan='3' style='color:#9E9492'>No projects seeded</td></tr>";
    }
  }
}

function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById("api-key-input").addEventListener("keydown", function (e) {
  if (e.key === "Enter") document.getElementById("unlock-btn").click();
});
</script>

</body>
</html>
